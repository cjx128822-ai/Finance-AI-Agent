user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ===== 基础 MIME / 编码 =====
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;

    # ===== 日志格式：带 request_id 和上游耗时 =====
    log_format main_json escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"request_id":"$request_id",'
        '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log main_json;

    # ===== 性能优化 =====
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 75s;
    keepalive_requests 1000;
    server_tokens off;  # 不暴露 Nginx 版本，安全

    # ===== 客户端请求限制 =====
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml;

    # ===== 限流：按 IP，每秒 10 个请求，允许突发 20 =====
    # LLM 接口贵，必须防刷
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    # ===== 上游：app 服务（Docker 内部 DNS 自动解析）=====
    upstream app_backend {
        server app:8000;
        keepalive 32;  # 复用长连接，减少握手开销
    }

    # Flower 监控面板，仅内部访问（建议生产环境前置鉴权）
    upstream flower_backend {
        server flower:5555;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # 每个请求生成 / 透传 request_id
        # $request_id 是 Nginx 1.11+ 内置变量，自动 UUID
        proxy_set_header X-Request-ID $request_id;

        # ===== 默认转发设置 =====
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # 启用 keepalive 必须置空
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 把 request_id 也返回给前端，方便用户报问题
        add_header X-Request-ID $request_id always;

        # ===== 健康检查直通 =====
        # 不限流，Nginx 自己也用这个判断上游死活
        location = /health {
            access_log off;
            proxy_pass http://app_backend/health;
            proxy_connect_timeout 2s;
            proxy_read_timeout 3s;
        }

        location = /ready {
            access_log off;
            proxy_pass http://app_backend/ready;
        }

        # ===== SSE 流式端点：长超时 + 强制关闭缓冲 =====
        # 单独拎出来：超时比普通 API 更长，且严格禁用所有缓冲
        location ~ ^/api/v1/chat/stream/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://app_backend;

            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            # SSE 三件套：禁用缓冲 / 禁用缓存 / 支持 chunked
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;

            # 关键：明确告诉 Nginx 这是事件流，不要 gzip 也不要攒包
            gzip off;
        }

        # ===== 其他 LLM 接口（投递 / 状态查询）=====
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://app_backend;

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

        # ===== Flower 监控面板（仅供开发/排查使用，建议加 basic auth）=====
        location /flower/ {
            proxy_pass http://flower_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Scheme $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Flower 用 WebSocket 推任务事件
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }

        # ===== 其他路由（如 /docs, /）=====
        location / {
            proxy_pass http://app_backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # ===== 自定义错误页（避免暴露 Nginx 默认页面）=====
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"detail":"service unavailable","request_id":"$request_id"}';
            default_type application/json;
        }
    }
}
