name: ai-infra-v1

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: ai-infra-app:1.0.0
    container_name: ai-infra-app
    # 不对外暴露端口：只允许 Nginx 通过内部网络访问
    # 想本地直连调试时取消下面注释
    # ports:
    #   - "8000:8000"
    environment:
      APP_VERSION: "1.0.0"
      MODEL_NAME: "mock-llm"
      ALLOWED_ORIGINS: "*"
      TZ: "Asia/Shanghai"
    restart: unless-stopped
    networks:
      - backend
    # 容器层资源限制：防止单服务吃光宿主机
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-infra-nginx
    ports:
      - "80:80"
    volumes:
      # 只读挂载配置：防止容器内进程篡改宿主机文件
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        # 等 app 健康检查通过再起 Nginx,避免上游全是 502
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend:
    driver: bridge

volumes:
  nginx_logs:
